<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">rag_kit</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Chunking, embeddings, vector search for Dart</text>

  <!-- motif: document -> chunks -> vector space retrieval -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- document split into three chunks by dashed lines -->
    <rect x="776" y="104" width="112" height="192" rx="4" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 781 168 L 883 168" stroke="#1E3A5F" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M 781 232 L 883 232" stroke="#1E3A5F" stroke-width="3" stroke-dasharray="8 8"/>
    <!-- text lines inside each chunk -->
    <path d="M 792 128 L 856 128 M 792 144 L 840 144" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 792 192 L 848 192 M 792 208 L 864 208" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 792 256 L 836 256 M 792 272 L 852 272" stroke="#1E3A5F" stroke-width="3"/>

    <!-- flow arrow -->
    <path d="M 906 200 L 950 200" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 942 192 L 952 200 L 942 208" stroke="#38BDF8" stroke-width="3"/>

    <!-- vector space: axes, points, two near neighbors highlighted -->
    <path d="M 984 96 L 984 292 L 1148 292" stroke="#1E3A5F" stroke-width="3"/>
    <circle cx="1014" cy="146" r="5" fill="#1E3A5F"/>
    <circle cx="1124" cy="120" r="5" fill="#1E3A5F"/>
    <circle cx="1022" cy="238" r="5" fill="#1E3A5F"/>
    <circle cx="1072" cy="262" r="5" fill="#1E3A5F"/>
    <circle cx="1136" cy="240" r="5" fill="#1E3A5F"/>
    <circle cx="1092" cy="168" r="6" fill="#38BDF8"/>
    <circle cx="1112" cy="188" r="6" fill="#38BDF8"/>
    <circle cx="1102" cy="178" r="34" stroke="#38BDF8" stroke-width="2.5" stroke-dasharray="6 8"/>
  </g>
</svg>

name: rag_kit
description: >-
  Pure-Dart RAG (retrieval-augmented generation): chunking, embeddings, vector
  search, and context building. Zero dependencies, bring your own embedding
  model.
version: 0.3.1
repository: https://github.com/Yusufihsangorgel/rag_kit
topics:
  - rag
  - retrieval
  - embeddings
  - llm
  - nlp

screenshots:
  - description: >-
      One Retriever ties a chunker, your embedder and a vector store together, s
      hared by the indexing path and the query path.
    path: doc/architecture.png

environment:
  sdk: ^3.8.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0

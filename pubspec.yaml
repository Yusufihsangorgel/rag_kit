name: rag_kit
description: >-
  Pure-Dart RAG (retrieval-augmented generation): chunking, embeddings, vector
  search, and context building. Zero dependencies, bring your own embedding
  model.
version: 0.2.1
repository: https://github.com/Yusufihsangorgel/rag_kit
topics:
  - rag
  - retrieval
  - embeddings
  - llm
  - nlp

screenshots:
  - description: >-
      The pipeline: one Retriever ties a chunker, your embedder and a vector sto
      re together, shared by the indexing path and the query path that ends in a
       prompt-ready context.
    path: doc/architecture.png

environment:
  sdk: ^3.8.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
